<section class="sk-section" id="rules">
<div class="sk-section-title">
<div class="sk-num">14 / Rules</div>
<h2>使用規則</h2>
</div>
<div class="sk-rule-grid">
<div class="sk-rule"><span class="sk-rule-icon">①</span><div><strong>規則 1</strong><br/><span class="sk-small">頁面不得新增自己的 button/card/table/timer 樣式。</span></div></div>
<div class="sk-rule"><span class="sk-rule-icon">②</span><div><strong>規則 2</strong><br/><span class="sk-small">RWD 只分三層：Desktop、Tablet、Mobile。</span></div></div>
<div class="sk-rule"><span class="sk-rule-icon">③</span><div><strong>規則 3</strong><br/><span class="sk-small">頁面特殊 CSS 只能做少量 override。</span></div></div>
<div class="sk-rule"><span class="sk-rule-icon">④</span><div><strong>規則 4</strong><br/><span class="sk-small">手機拖曳不要只用 dragstart/drop，要用 Pointer Events。</span></div></div>
<div class="sk-rule"><span class="sk-rule-icon">⑤</span><div><strong>規則 5</strong><br/><span class="sk-small">統一用途變色：藍主色、綠成功、黃警告、紅危險。</span></div></div>
</div>
</section>
