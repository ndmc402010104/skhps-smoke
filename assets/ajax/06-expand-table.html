<section class="sk-section">
<div class="sk-section-title">
<div class="sk-num">05B / Expand Detail Table</div>
<h2>傳統 table：點 row 展開 detail</h2>
</div>
<div class="sk-card sk-table-shell">
<div class="sk-table-toolbar">
<div class="sk-table-toolbar-left">
<button class="sk-btn sk-btn-outline" id="expandReorderBtn" type="button">↕ 調整順序</button>
<button class="sk-btn sk-btn-outline" id="expandCollapseBtn" type="button">收合目前列</button>
<span class="sk-table-mode-text" id="expandModeText">預設模式：點 row 展開 detail；右滑只開 action。</span>
</div>
<div class="sk-table-toolbar-right">
<button class="sk-btn sk-btn-primary" type="button">新增資料</button>
<button class="sk-btn sk-btn-outline" type="button">匯出</button>
</div>
</div>
<div class="sk-table-wrap">
<table aria-label="Expand Detail Table" class="sk-table sk-expand-table" id="expandTable">
<colgroup>
<col class="col-project"/><col class="col-env"/><col class="col-position"/><col class="col-status"/><col class="col-version"/><col class="col-updated"/>
</colgroup>
<thead>
<tr>
<th>專案</th><th>環境</th><th>位置</th><th>狀態</th><th>版本</th><th>最後報到</th>
</tr>
</thead>
<tbody id="expandTbody"></tbody>
</table>
</div>
<div class="sk-alert sk-alert-info" id="expandStatus">點 row：展開 detail 並自動打開 action rail。右滑 row：只打開 action rail，不展開。點另一 row 時會補償新箭頭位置。</div>
</div>
</section>
