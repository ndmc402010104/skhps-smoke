<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SKHPS Smoke / UI Design Article Lab</title>
<style>

:root{
  --bg:#e9eef3;
  --bg2:#dfe7ee;
  --paper:#fbfbf8;
  --paper2:#fffefa;
  --panel:#f2f6f8;
  --panel2:#e7eef3;
  --line:#d4dde5;
  --line-soft:rgba(212,221,229,.78);
  --text:#24323d;
  --muted:#65747f;
  --soft:#8a98a3;
  --primary:#516d87;
  --primary-dark:#40596f;
  --primary-soft:rgba(81,109,135,.13);
  --accent:#a78d72;
  --ok:#5f8a79;
  --warn:#c09a5f;
  --danger:#b06f6a;
  --info:#5b7f99;
  --radius-sm:12px;
  --radius-md:18px;
  --radius-lg:24px;
  --radius-xl:32px;
  --shadow-soft:0 14px 34px rgba(31,45,55,.10);
  --shadow-card:0 24px 58px rgba(31,45,55,.13);
  --font:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:var(--font);
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.55), transparent 36%),
    linear-gradient(135deg,var(--bg),var(--bg2));
  line-height:1.75;
}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
a{color:inherit}
code{
  background:#eef2f5;
  color:var(--primary-dark);
  padding:2px 7px;
  border-radius:8px;
  font-size:.9em;
}
pre{
  white-space:pre-wrap;
  background:#f3f6f8;
  border:1px solid var(--line);
  padding:16px;
  border-radius:16px;
  overflow:auto;
}
.skhps-smoke-page{
  width:min(100% - 28px, 1640px);
  margin:0 auto;
  padding:26px 0 72px;
}
.sk-shell{
  display:grid;
  grid-template-columns:300px minmax(0,1fr);
  gap:20px;
  align-items:start;
}
.sk-sidebar{
  position:sticky;
  top:18px;
  max-height:calc(100vh - 36px);
  overflow:auto;
  background:rgba(251,251,248,.94);
  border:1px solid var(--line-soft);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-soft);
  padding:16px;
}
.sk-brand{
  padding:8px 10px 16px;
  border-bottom:1px solid var(--line-soft);
  margin-bottom:10px;
}
.sk-brand-kicker{
  font-size:12px;
  color:var(--muted);
  letter-spacing:.16em;
  text-transform:uppercase;
  font-weight:950;
}
.sk-brand-title{
  font-size:22px;
  font-weight:950;
  letter-spacing:-.05em;
  margin-top:4px;
}
.sk-brand-sub{
  color:var(--muted);
  font-size:13px;
}
.sk-topic-nav{
  display:grid;
  gap:6px;
}
.sk-topic-btn{
  width:100%;
  border:0;
  background:transparent;
  color:var(--muted);
  border-radius:14px;
  padding:10px 12px;
  text-align:left;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:10px;
}
.sk-topic-btn:hover{
  background:var(--panel);
  color:var(--text);
}
.sk-topic-btn.is-active{
  background:var(--primary);
  color:white;
}
.sk-topic-num{
  min-width:28px;
  height:28px;
  border-radius:999px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  background:rgba(81,109,135,.12);
  font-size:12px;
  font-weight:950;
}
.sk-topic-btn.is-active .sk-topic-num{
  background:rgba(255,255,255,.22);
}
.sk-main{
  min-width:0;
}
.sk-hero{
  background:rgba(251,251,248,.96);
  border:1px solid var(--line-soft);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow-card);
  padding:34px;
  margin-bottom:20px;
}
.sk-hero h1{
  margin:8px 0 10px;
  font-size:40px;
  line-height:1.08;
  letter-spacing:-.06em;
}
.sk-hero p{
  margin:0;
  color:var(--muted);
  max-width:980px;
}
.sk-article{
  background:rgba(251,251,248,.96);
  border:1px solid var(--line-soft);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow-card);
  padding:34px;
  min-height:720px;
}
.sk-loading{
  min-height:420px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-weight:900;
}
.sk-article h2{
  font-size:32px;
  line-height:1.15;
  letter-spacing:-.055em;
  margin:0 0 12px;
}
.sk-article h3{
  font-size:22px;
  letter-spacing:-.04em;
  margin:30px 0 8px;
}
.sk-article h4{
  font-size:17px;
  margin:20px 0 6px;
}
.sk-article p{
  margin:0 0 14px;
}
.sk-lead{
  color:var(--muted);
  font-size:17px;
  max-width:980px;
}
.sk-kicker{
  color:var(--muted);
  font-size:13px;
  font-weight:950;
  letter-spacing:.14em;
  text-transform:uppercase;
}
.sk-card{
  background:var(--paper);
  border:1px solid var(--line-soft);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-soft);
  padding:22px;
}
.sk-grid{
  display:grid;
  gap:16px;
}
.sk-grid-2{grid-template-columns:1fr 1fr}
.sk-grid-3{grid-template-columns:repeat(3,1fr)}
.sk-callout{
  border-radius:18px;
  padding:16px 18px;
  border:1px solid var(--line-soft);
  background:var(--panel);
  margin:16px 0;
}
.sk-callout.good{background:rgba(95,138,121,.10);border-left:7px solid var(--ok)}
.sk-callout.warn{background:rgba(192,154,95,.12);border-left:7px solid var(--warn)}
.sk-callout.danger{background:rgba(176,111,106,.10);border-left:7px solid var(--danger)}
.sk-callout.info{background:rgba(91,127,153,.10);border-left:7px solid var(--info)}
.sk-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  border-radius:999px;
  padding:5px 10px;
  background:var(--primary-soft);
  color:var(--primary-dark);
  font-size:12px;
  font-weight:950;
}
.sk-rule-list{
  display:grid;
  gap:12px;
  margin:16px 0;
}
.sk-rule{
  border:1px solid var(--line-soft);
  border-radius:18px;
  background:#f8fafb;
  padding:16px 18px;
}
.sk-rule strong{
  display:block;
  margin-bottom:4px;
}
.sk-compare{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin:16px 0;
}
.sk-compare .bad{
  border-left:7px solid var(--danger);
}
.sk-compare .good{
  border-left:7px solid var(--ok);
}
.sk-demo{
  background:#f1f5f8;
  border:1px dashed #c5d0d9;
  border-radius:22px;
  padding:18px;
  margin:18px 0;
}
.sk-demo-title{
  font-weight:950;
  margin-bottom:12px;
}
.sk-demo-frame{
  background:white;
  border:1px solid #d8e0e8;
  border-radius:20px;
  padding:18px;
  margin:12px 0;
  overflow:hidden;
}
.sk-demo-header{
  min-height:58px;
  border:1px solid var(--line);
  background:rgba(251,251,248,.96);
  border-radius:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  gap:16px;
}
.sk-demo-brand{
  display:flex;
  align-items:center;
  gap:12px;
}
.sk-demo-logo{
  width:38px;
  height:38px;
  border-radius:12px;
  background:var(--primary);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:950;
}
.sk-demo-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.sk-btn{
  border:1px solid transparent;
  background:var(--panel);
  color:var(--text);
  border-radius:12px;
  min-height:40px;
  padding:9px 16px;
  font-weight:950;
}
.sk-btn.primary{background:var(--primary);color:white}
.sk-btn.outline{background:transparent;border-color:var(--line);color:var(--primary)}
.sk-btn.ghost{background:transparent;color:var(--muted)}
.sk-btn.danger{background:var(--danger);color:white}
.sk-link-btn{
  border:0;
  background:transparent;
  color:var(--primary);
  font-weight:950;
  padding:0;
}
.sk-demo-footer{
  min-height:44px;
  border:1px solid var(--line);
  background:rgba(251,251,248,.92);
  border-radius:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  color:var(--muted);
  font-size:12px;
}
.sk-lamps{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.sk-layout-strip{
  display:grid;
  gap:12px;
}
.sk-box{
  border:1px solid var(--line);
  background:#fffefa;
  border-radius:18px;
  padding:18px;
}
.sk-box.reading{max-width:860px;margin:0 auto}
.sk-box.admin{max-width:1480px;margin:0 auto}
.sk-box.full{width:100%;margin:0 auto}
.sk-table-lite{
  display:grid;
  gap:10px;
}
.sk-row{
  display:grid;
  grid-template-columns:2.2fr .8fr .9fr 1fr .8fr;
  gap:10px;
  align-items:center;
  border:1px solid var(--line);
  background:#fffefa;
  border-radius:18px;
  padding:14px 16px;
}
.sk-row.header{
  background:#eef3f7;
  color:var(--muted);
  font-size:12px;
  font-weight:950;
  text-transform:uppercase;
}
.sk-row-main{
  display:grid;
  gap:2px;
  min-width:0;
}
.sk-row-main strong,
.sk-row-main span{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.sk-row-main span{
  color:var(--muted);
  font-size:13px;
}
.sk-detail{
  margin-top:8px;
  background:#f5f8fa;
  border:1px solid var(--line-soft);
  border-radius:16px;
  padding:14px 16px;
  color:var(--muted);
}
.sk-bad-table{
  overflow-x:auto;
  border:1px dashed #c8d3dd;
  padding:10px;
  border-radius:16px;
}
.sk-bad-table table{
  width:100%;
  min-width:1280px;
  border-collapse:separate;
  border-spacing:0 8px;
}
.sk-bad-table th,.sk-bad-table td{
  white-space:nowrap;
  padding:10px 12px;
  background:#fffefa;
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.sk-form-demo{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.sk-field{
  display:grid;
  gap:7px;
}
.sk-label{
  font-size:13px;
  font-weight:950;
}
.sk-input,.sk-select,.sk-textarea{
  width:100%;
  border:1px solid var(--line);
  background:#fffefa;
  border-radius:16px;
  padding:12px 14px;
}
.sk-textarea{min-height:100px;grid-column:1/-1}
.sk-mobile-demo{
  width:360px;
  max-width:100%;
  margin:0 auto;
  border:10px solid #2f3a42;
  border-radius:34px;
  padding:14px;
  background:#eef3f7;
}
.sk-mobile-card{
  background:#fffefa;
  border:1px solid var(--line);
  border-radius:18px;
  padding:14px;
  margin-bottom:10px;
}
.sk-footer-note{
  color:var(--muted);
  font-size:12px;
  text-align:center;
  padding:24px 0 0;
}
@media (max-width:1100px){
  .sk-shell{grid-template-columns:1fr}
  .sk-sidebar{position:static;max-height:none}
  .sk-grid-2,.sk-grid-3,.sk-compare,.sk-form-demo{grid-template-columns:1fr}
  .sk-row{grid-template-columns:1.7fr .8fr .9fr}
  .sk-row > :nth-child(4), .sk-row > :nth-child(5){display:none}
}
@media (max-width:640px){
  .skhps-smoke-page{width:min(100% - 20px, 1640px);padding-top:14px}
  .sk-hero,.sk-article{padding:22px;border-radius:22px}
  .sk-hero h1{font-size:30px}
  .sk-article h2{font-size:26px}
}


/* =========================================================
   EXTRA EXAMPLE PATTERNS / v0.3.1
========================================================= */
.ex-strip{display:grid;gap:14px;margin:18px 0}
.ex-title{font-weight:950;color:var(--primary-dark);margin-bottom:8px}
.ex-mini-label{font-size:12px;font-weight:950;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.ex-browser{border:1px solid var(--line);border-radius:20px;background:#eef3f7;overflow:hidden}
.ex-browser-bar{height:36px;display:flex;align-items:center;gap:6px;padding:0 12px;border-bottom:1px solid var(--line)}
.ex-dot{width:10px;height:10px;border-radius:50%;background:#c8d2dc}
.ex-screen{padding:16px;background:#f8fafb}
.ex-layout{display:grid;gap:12px}
.ex-layout.narrow{max-width:760px;margin:0 auto}
.ex-layout.wide{max-width:1260px;margin:0 auto}
.ex-layout.full{width:100%}
.ex-hero-card{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 10px 22px rgba(31,45,55,.08)}
.ex-hero-card h4{margin:0 0 6px;font-size:22px}
.ex-hero-card p{margin:0;color:var(--muted)}
.ex-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:12px 14px}
.ex-filter-row{display:flex;gap:8px;flex-wrap:wrap}
.ex-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#f7f9fb;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:850;color:var(--muted)}
.ex-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.ex-card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.ex-stat{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px}
.ex-stat strong{display:block;font-size:26px;line-height:1}
.ex-stat span{color:var(--muted);font-size:13px}
.ex-list{display:grid;gap:8px}
.ex-list-row{display:grid;grid-template-columns:2fr .8fr .8fr 1fr auto;gap:10px;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:12px}
.ex-list-row.header{background:#edf3f7;color:var(--muted);font-size:12px;font-weight:950}
.ex-list-main{display:grid;gap:2px;min-width:0}
.ex-list-main strong,.ex-list-main span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ex-list-main span{color:var(--muted);font-size:13px}
.ex-sidepanel-demo{display:grid;grid-template-columns:1fr 340px;gap:12px}
.ex-panel{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:16px}
.ex-modal-backdrop{background:rgba(31,45,55,.16);border-radius:20px;padding:28px;display:flex;justify-content:center}
.ex-modal-card{width:min(100%,420px);background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:20px;box-shadow:var(--shadow-card)}
.ex-footer-variants{display:grid;gap:10px}
.ex-footer-demo{display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);background:var(--paper);border-radius:16px;padding:10px 12px;color:var(--muted);font-size:12px}
.ex-bad-block{border:1px solid rgba(176,111,106,.35);background:rgba(176,111,106,.08);border-radius:18px;padding:16px}
.ex-good-block{border:1px solid rgba(95,138,121,.35);background:rgba(95,138,121,.08);border-radius:18px;padding:16px}
.ex-button-wall{display:flex;gap:8px;flex-wrap:wrap}
.ex-button-wall.bad .sk-btn{background:var(--primary);color:#fff}
.ex-form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.ex-form-section{border:1px solid var(--line);background:var(--paper);border-radius:18px;padding:16px}
.ex-density-loose .ex-list-row{padding:22px}
.ex-density-tight .ex-list-row{padding:7px 10px;font-size:13px}
.ex-density-balanced .ex-list-row{padding:12px}
.ex-phone-row{display:grid;gap:10px}
.ex-phone-card{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:14px}
.ex-phone-meta{display:flex;justify-content:space-between;gap:8px;margin-top:8px;color:var(--muted);font-size:12px}
.ex-motion-box{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.ex-step{flex:1;min-width:140px;border:1px solid var(--line);background:var(--paper);border-radius:18px;padding:14px;text-align:center}
.ex-arrow{font-size:24px;color:var(--muted)}
.ex-palette{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.ex-color{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--paper)}
.ex-color-swatch{height:64px}
.ex-color-label{padding:10px;font-size:12px;font-weight:900}
.ex-access-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ex-large-hit{display:inline-flex;align-items:center;justify-content:center;min-width:44px;min-height:44px;border-radius:12px;border:1px solid var(--line);background:var(--paper)}
.ex-small-hit{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:7px;border:1px solid var(--line);background:var(--paper)}
@media (max-width:900px){
  .ex-card-grid,.ex-sidepanel-demo,.ex-form-grid,.ex-palette,.ex-access-row{grid-template-columns:1fr}
  .ex-list-row{grid-template-columns:1.5fr .8fr .8fr}
  .ex-list-row > :nth-child(4), .ex-list-row > :nth-child(5){display:none}
}

</style>
</head>
<body>
<div class="skhps-smoke-page">
  <div class="sk-shell">
    <aside class="sk-sidebar">
      <div class="sk-brand">
        <div class="sk-brand-kicker">SKHPS Smoke</div>
        <div class="sk-brand-title">UI Design Article Lab</div>
        <div class="sk-brand-sub">AJAX topic reader / Theme40 teaching smoke</div>
      </div>
      <nav class="sk-topic-nav" id="topicNav" aria-label="UI 設計文章主題"></nav>
      <div class="sk-callout info" style="font-size:13px;margin-bottom:0">
        <strong>閱讀方式：</strong><br>
        左側切換 topic。每篇都是獨立 AJAX fragment，適合之後繼續加文章。
      </div>
    </aside>

    <main class="sk-main">
      <section class="sk-hero">
        <div class="sk-kicker">UI 設計教學館</div>
        <h1 id="heroTitle">總覽</h1>
        <p id="heroSub">UI 設計不是裝飾，是工作流程的空間安排</p>
      </section>

      <div class="sk-article" id="articleContent">
        <div class="sk-loading">載入文章中…</div>
      </div>

      <div class="sk-demo-footer" style="margin-top:18px">
        <div>SKHPS Smoke UI Design Article Lab</div>
        <div id="smokeStatus">初始化中</div>
        <div class="sk-lamps"><span>🟢 AJAX</span><span>🟢 CSS inline</span><span>🟢 one smoke</span></div>
      </div>
      <div class="sk-footer-note">這份 smoke 可直接覆蓋 skhps-smoke，用來長期沉澱 UI 設計概念。</div>
    </main>
  </div>
</div>
<script src="assets/js/app.js"></script>
</body>
</html>
